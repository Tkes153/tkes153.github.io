<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal blog - thoughts on tech, life, and learning">
  <title>My Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="#/" class="logo" data-i18n="siteTitle">My Blog</a>
      <nav class="nav">
        <a href="#/" class="nav-link active" data-i18n="home">Home</a>
        <a href="#/about" class="nav-link" data-i18n="about">About</a>
      </nav>
      <div class="header-actions">
        <div id="authArea" class="header-auth"></div>
        <button class="icon-btn" id="langToggle" aria-label="Switch language" title="Switch language">
          <span class="lang-text">中</span>
        </button>
        <button class="icon-btn" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main" id="main">
    <!-- SPA content rendered here -->
  </main>

  <!-- Auth Modal (Login / Register) -->
  <div class="modal" id="authModal"></div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <p data-i18n="footerText">Built with ❤️ using plain HTML, CSS & JS</p>
      <p style="margin-top:6px;"><a href="#/admin" style="font-size:0.75rem;color:var(--text-tertiary);opacity:0.5;">管理</a></p>
    </div>
  </footer>

  <!-- Back to Top -->
  <button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>

  <!-- CloudBase SDK (China CDN) -->
  <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>

  <!-- Application Scripts (order matters) -->
  <script src="js/cloudbase-config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/posts.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
